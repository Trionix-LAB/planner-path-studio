name: Release (Windows, Linux, macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string
      publish:
        description: "Publish release (draft=false)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: npm run electron:build:win
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            platform: linux
            build_cmd: npm run electron:build:linux
            artifacts: |
              release/*.AppImage
              release/*.deb
          - os: macos-latest
            platform: mac
            build_cmd: npm run electron:build:mac
            artifacts: |
              release/*.dmg
              release/*.zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    env:
      PFX_B64: ${{ secrets.WIN_CODE_SIGN_CERT_BASE64 }}
      PFX_PASSWORD: ${{ secrets.WIN_CODE_SIGN_CERT_PASSWORD }}
      TIMESTAMP_URL: ${{ secrets.WIN_CODE_SIGN_TIMESTAMP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (macOS, needed for dmg-license)
        if: matrix.platform == 'mac'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron (${{ matrix.platform }})
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build outputs
        shell: bash
        run: |
          if [ ! -d "release" ]; then
            echo "::error::release/ directory not found"
            exit 1
          fi
          find release -type f | head -50 || true

      - name: Optional Windows code signing
        if: matrix.platform == 'win' && env.PFX_B64 != '' && env.PFX_PASSWORD != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))

          $timestamp = if ($env:TIMESTAMP_URL -and $env:TIMESTAMP_URL.Trim() -ne "") {
            $env:TIMESTAMP_URL
          } else {
            "http://timestamp.digicert.com"
          }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$signtool) { throw "signtool.exe not found on runner" }

          $targets = Get-ChildItem -Path "release" -Filter "*.exe" -File
          if (!$targets) { throw "No .exe found in release/" }

          foreach ($t in $targets) {
            & $signtool sign /f $pfxPath /p $env:PFX_PASSWORD `
              /fd SHA256 /tr $timestamp /td SHA256 /v $t.FullName
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all release files
        run: find artifacts -type f | sort || true

      - name: Create/update draft GitHub Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: artifacts/*
          fail_on_unmatched_files: false

      - name: Create/update GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ !inputs.publish }}
          files: artifacts/*
          fail_on_unmatched_files: false
